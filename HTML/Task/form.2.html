<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form-2</title>
</head>
<body>
    <label for="nm">NAME:</label>
    <input type="text" name="nm" id="" class="" placeholder="Name"></label>
    <br>
    <label for="pass">PASSWORD:</label>
    <input type="pass" name="pass" id="" class="" placeholder="Password" requiredminlength="8" maxlength="8" pattern="[A-Z,a-z,#]{8}">
    <br>
    <label for="gen">GENDER:</label>
    male:<input type="radio" name="gen" id="" class="">
    female:<input type="radio" name="gen" id="" class="">
    <br>
    <label for="email">EMAIL:</label>
    <input type="email" name="email" id="" class="" placeholder="Email">
    <br>
    <label for="phon">PHONE NUMBER:</label>
    <select type="" name="">
        <option value="+91">+91</option>
        <option value="+92">+92</option>
    </select>
    <input type="tel" name="ten" id="" class="" placeholder="Phone no">
    <br><br>
    <input type="submit" value="submit">
    
</body>
</html>
