<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>banner</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .banner{
            height: 500px;
            width: 100%;
            border: 1px solid black;
            position: relative;
        }
        .banner .child{
            height: 100%;
            width: 100%;
            text-align: center;
            line-height: 170px;
            position: absolute;
        }
        .banner .c-1 img{
            filter: brightness(70%);
        }
        .banner .child h1 span{
            color: yellow;
            font-weight: 100;
        }

    </style>
</head>
<body>
    <div class="banner">
        <div class="child c-1">
            <img src="https://lapinozpizza.in/assets/wla_new/lapinoz/img/banner3.jpg" alt="" height="100%" width="100%">
        </div>
        <div class="child c-2">
            <h1>La'pinoz Going International <br><span>Across 6 countries</span></h1>
        </div>
    </div>
</body>
</html>
