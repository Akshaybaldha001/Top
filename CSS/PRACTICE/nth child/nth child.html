<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nth child</title>
    <style>
        div{
            height: 20Spx;
            width: 25px;
            border: 3px solid black;
            background: red;
        }
        div:nth-child(odd){
            color: black;
            border: 3px solid white;
        }
        div :nth-child(even){
            border: 5px solid blue;
            color: azure;
        }
    </style>
</head>
<body>
    <div>list item</div>
    <div>list item</div>
    <div>list item</div>
    <div>list item</div>
    <div>list item</div>
    <div>list item</div>
    <div>list item</div>
    <div>list item</div>
    
</body>
</html>
