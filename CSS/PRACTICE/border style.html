<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border style</title>
    <style>
        div{
            height: 150px;
            width: auto;
            border: 8px solid black;
            margin: 50px;
        }
        div :first-child{
          border-style:solid;
        }
        div :nth-child(2){
            border-style:double;
        }
        div :nth-child(3){
            border-style:dotted;
        }
    </style>
</head>
<body>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    
</body>
</html>
