<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://malsup.github.io/jquery.cycle.all.js"></script>
    
    <style>
        #slide{
    height: 500px;
    width: 100%;
}
#slide img{
    height: 100%;
    width: 100%;
}
    </style>
</head>

<body>
    <div id="slide">
        <img src="https://img.freepik.com/premium-photo/image-colorful-galaxy-sky-generative-ai_791316-9864.jpg?w=996" alt="">
        <img src="https://img.freepik.com/free-photo/colorful-powder-explosion-happy-holi-festival_24972-433.jpg?w=996&t=st=1703150658~exp=1703151258~hmac=3b837dc8e4213366e4bc9a45bae10d7d0d2d2ff75623d3ae9fdc27e0af7e2b42" alt="">
        <img src="https://img.freepik.com/free-photo/explosion-colored-powder-dark-black-surface_23-2148054157.jpg?w=996&t=st=1703150690~exp=1703151290~hmac=301abbf2f9c29f32aa9324df7ac813b4aedf67ae2fe333ca64bbd8738c5ea4e0" alt="">
    </div>
    <script>
        $(document).ready(function(){
    $('#slide').cycle('scrollRight, scrollLeft, fade, zoom');
});
    </script>
</body>

</html>
